<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-01</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <!-- header section -->
    <header>
      <!-- nav section -->
      <section class="nav">
        <h1>LOGO</h1>
        <button class="btn">Sign Up</button>
      </section>
      <!-- header section -->
      <section class="hero">
        <div class="hero-title">
          <h1>Cool Dark UI Template for Webflow Agencies!</h1>
        </div>
        <button class="btn">Stay Focused</button>
      </section>
    </header>
    <!-- main section -->
    <main>
      <section class="action-section">
        <div class="container">
          <div class="content-side">
            <h3 class="title">See It in Action</h3>
            <p class="description">
              Explore the live preview and imagine your brand in this bold new
              look.
            </p>
            <button class="content-btn">Launch Live Preview</button>
          </div>
          <div class="image-side">
            <img class="action-img" src="./Assets/wc-mini.png" alt="" />
          </div>
        </div>
      </section>
      <section class="stats-section">
        <div class="stats-container">
          <h3 class="stats-title">Joined Thousands of Productive Users</h3>
          <div class="stats-grid">
            <!-- 1st -->
            <div class="stat-item">
              <span class="stat-number">50K</span>
              <p class="stat-label">Active Users</p>
            </div>
            <!-- 2nd -->
            <div class="stat-item">
              <span class="stat-number">2M+</span>
              <p class="stat-label">Focus Sessions</p>
            </div>
            <!-- 3rd -->
            <div class="stat-item">
              <span class="stat-number">95%</span>
              <p class="stat-label">Satisfaction Rate</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <!-- footer section -->
    <footer></footer>
  </body>
</html>
